<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Room</title>
</head>
<body>
    <h1>Create a Chat Room</h1>
    <p><a href="{{ url_for('home') }}">&larr; Back to Dashboard</a></p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('create_room') }}">
        <label for="name">Room Name:</label><br>
        <input type="text" id="name" name="name" required placeholder="e.g. Study Group, Movie Night"><br><br>

        <label>Room Type:</label><br>
        <label>
            <input type="radio" name="is_public" value="true" checked>
            Public (anyone can browse and join)
        </label><br>
        <label>
            <input type="radio" name="is_public" value="false">
            Private (invite only – users must enter the room code)
        </label><br><br>

        <button type="submit">Create Room</button>
    </form>
</body>
</html>
